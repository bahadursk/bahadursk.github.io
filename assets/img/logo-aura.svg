<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 120" role="img" aria-labelledby="title desc">
  <title id="title">AURA Lab Logo</title>
  <desc id="desc">Stylized AURA Lab logo for Dr. Bahadur Sk</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1a0533"/>
      <stop offset="55%" stop-color="#2d0d57"/>
      <stop offset="100%" stop-color="#4b157c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="55%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1.5" y="1.5" width="417" height="117" rx="28" fill="url(#bg)" stroke="#7c3aed" stroke-opacity="0.4"/>
  <g transform="translate(28 20)">
    <circle cx="40" cy="40" r="32" fill="none" stroke="url(#accent)" stroke-width="4" filter="url(#glow)"/>
    <path d="M40 10c12 0 22 10 22 22 0 11-8 21-19 23l8 14h-9l-7-12h-5v12h-8V37h18c8 0 14-6 14-13S48 10 40 10Z" fill="#f5edff" opacity="0.95"/>
    <circle cx="67" cy="20" r="5" fill="#ec4899"/>
  </g>
  <g transform="translate(110 31)">
    <text x="0" y="26" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="4" fill="#f3e8ff">AURA LAB</text>
    <text x="0" y="54" font-family="Inter, Arial, sans-serif" font-size="12.5" font-weight="600" letter-spacing="3.2" fill="#d8b4fe">DR. BAHADUR SK · MOLECULAR PHOTONICS · OLED MATERIALS</text>
  </g>
</svg>
